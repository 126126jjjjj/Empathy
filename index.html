<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歡迎光臨，馬路格鬥場繪本</title>
    <style>
        :root {
            --total-width: 1130px; 
            --total-height: 600px;
            --page-width: 565px;   
        }

        body {
            background-color: #0c0c0c; 
            color: #fff;
            font-family: 'Noto Serif TC', 'Microsoft JhengHei', serif;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 入口選單 */
        #entrance { text-align: center; z-index: 600; max-width: 90%; margin: auto; }
        #entrance h1 { font-size: 50px; margin-bottom: 40px; letter-spacing: 2px; color: #bfa15f; }
        #entrance p { color: #aaa; margin-bottom: 35px; font-size: 40px; }
        .btn-group { display: flex; gap: 50px; justify-content: center; }
        .start-btn {
            padding: 15px 35px; font-size: 25px; cursor: pointer; border: 2px solid #bfa15f;
            background: transparent; color: #bfa15f; border-radius: 8px; transition: all 0.3s; font-weight: bold;
        }
        .start-btn:hover { background: #bfa15f; color: #1a1a1a; box-shadow: 0 0 20px rgba(191, 161, 95, 0.4); }

        /* 頂部控制面板 */
        .control-panel {
            display: none; align-items: center; gap: 20px;
            background: #1f1f1f; padding: 10px 25px; border-radius: 30px; z-index: 500;
            border: 2px solid #333;
            margin-bottom: 20px;
        }
        .panel-btn { background: #333; color: #fff; border: none; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-size: 13px; }
        .panel-btn:hover { background: #444; }
        .current-view-tag { font-size: 13px; color: #bfa15f; font-weight: bold; }

        /* 自動播放開關 */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; margin-left: 5px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #bfa15f; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* 書本縮放主框架 */
        .book-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            margin-bottom: 25px;
        }

        /* 書本容器 */
        .book-container {
            display: none;
            width: var(--total-width);
            height: var(--total-height); 
            position: relative;
            background: #111;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 內頁舞台 */
        .book-stage {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }

        .paper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transition: transform 0.6s ease-in-out;
            -webkit-transition: -webkit-transform 0.6s ease-in-out;
        }

        .page-side {
            position: absolute;
            height: 100%;
            width: var(--page-width); 
            top: 0;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0 2px 0px rgba(0, 0, 0, 0); 
            transition: opacity 0.3s ease-in-out;
            /* 額外加上硬體加速優化提示，防止 iPad 在連續快點時產生圖層反應死鎖 */
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }

        .full-spread-img {
            width: var(--total-width);
            height: var(--total-height);
            position: absolute;
            top: 0;
            pointer-events: none;
        }

        .single-mode {
            width: var(--page-width) !important; 
            height: 100% !important;
            object-fit: fill !important;
            left: 0 !important;
        }

        /* 左右半頁精確剪裁定位 */
        .front {
            left: var(--page-width);
            transform-origin: left center;
            -webkit-transform-origin: left center;
            border-radius: 0 8px 8px 0;
            opacity: 1;
            z-index: 2;
        }
        .front .full-spread-img:not(.single-mode) {
            left: calc(-1 * var(--page-width));
        }

        .back {
            left: 0;
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
            transform-origin: right center;
            -webkit-transform-origin: right center;
            border-radius: 8px 0 0 8px;
            opacity: 0; 
            z-index: 1;
        }
        .back .full-spread-img {
            left: 0;
        }

        /* 當頁面被翻過去時 */
        .paper.flipped {
            transform: rotateY(-180deg);
            -webkit-transform: rotateY(-180deg);
        }

        /* 翻過去後：正面(右頁)徹底隱藏，杜絕背面鏡像穿透 */
        .paper.flipped .front {
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* 翻過去後：背面(左頁)顯現 */
        .paper.flipped .back {
            opacity: 1;
            z-index: 2;
            pointer-events: auto;
        }

        /* 封面主標題 */
        .custom-text-box {
            position: absolute;
            z-index: 30;               
            top: 38px;                 
            color: #bfa15f;            
            font-size: 34px;
            font-weight: bold;
            letter-spacing: 6px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9); 
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        /* 全域固定字幕 */
        .global-text-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;         
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 75%, rgba(0,0,0,0) 100%);
            padding: 50px 40px 30px 40px;
            z-index: 500; 
            color: #fff;
            box-sizing: border-box;
            pointer-events: none;
            text-align: center;
            border-radius: 0 0 8px 8px;
        }
        .global-text-overlay p { font-size: 24px; line-height: 1.4; margin: 0; text-align: center; opacity: 0.95; letter-spacing: 1px; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }

        /* 獨立全域頁碼 */
        .global-floating-num {
            position: absolute;
            bottom: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            color: #ccc;
            z-index: 510;
            pointer-events: none;
        }
        .global-num-left { left: 20px; }
        .global-num-right { right: 20px; }

        /* 底部控制按鈕列 */
        .page-controls { display: none; gap: 50px; z-index: 1000; margin-top: 10px; }
        .nav-btn {
            background-color: #1a1a1a; color: #bfa15f; border: 2px solid #bfa15f;
            padding: 10px 35px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer;
            transition: all 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .nav-btn:hover { background-color: #bfa15f; color: #1a1a1a; box-shadow: 0 0 15px rgba(191, 161, 95, 0.5); }
    </style>
</head>
<body>

    <div class="control-panel" id="panel">
        <button class="panel-btn" onclick="resetBook()">返回選單</button>
        <span class="current-view-tag" id="view-tag">目前視角：行人小芳</span>
        <span style="font-size: 13px; margin-left: 15px; color: #aaa;" id="mode-text">自動翻頁</span>
        <label class="switch">
            <input type="checkbox" id="auto-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <div id="entrance">
        <h1>《 歡迎光臨，馬路格鬥場 》</h1>
        <p>點選你想觀看的角色，進入不同的視角故事：</p>
        <div class="btn-group">
            <button class="start-btn" onclick="startBook('pedestrian')">🚶 行人小芳 視角</button>
            <button class="start-btn" onclick="startBook('driver')">🚗 駕駛阿哲 視角</button>
        </div>
    </div>

    <div class="book-wrapper">
        <div class="book-container" id="book">
            <div class="book-stage" id="book-stage"></div>
            
            <div class="global-text-overlay" id="global-subtitle" style="display: none;"></div>
            <div class="global-floating-num global-num-left" id="global-p-left" style="display: none;"></div>
            <div class="global-floating-num global-num-right" id="global-p-right" style="display: none;"></div>
        </div>
    </div>

    <div class="page-controls" id="controls-bar">
        <button class="nav-btn" onclick="prevPage()">◀ 上一頁</button>
        <button class="nav-btn" onclick="nextPage()">下一頁 ▶</button>
    </div>

    <script>
        const totalPages = 32;
        const totalPapers = totalPages / 2; 
        let currentMode = 'pedestrian'; 
        let currentPaperIndex = 0;      
        let autoInterval = null; 

        // ==========================================
        // 【資料庫邏輯】 完美保留你原始的所有圖片檔名與大小寫
        // ==========================================
        function getPageData(num) {
            if (num === 1) {
                return { img: 'book0-1.PNG', isSinglePage: true, customText: '行人小芳' };
            }
            if (num === 2 || num === 3) {
                return { img: 'book2-1.PNG', isSinglePage: false, desc: '小芳今天心情很好，音樂裡的節奏讓步履變得很輕快。耳機裡的旋律蓋過了城市的喧囂。' };
            }
            if (num === 4 || num === 5) {
                return { img: 'book3-1.PNG', isSinglePage: false, desc: '她覺得自己走得很邊邊了，躲在建築物的陰影下，這裡應該很安全。' };
            }
            if (num === 6 || num === 7) {
                return { img: 'book4-1.PNG', isSinglePage: false, desc: '這個路口沒有號誌。小芳沒有停下，她正忙著回覆訊息。' };
            }
            if (num === 8 || num === 9) {
                return { img: 'book5-1.PNG', isSinglePage: false, desc: '下一秒，機車突然出現！小芳受到極大的驚嚇。' };
            }
            if (num === 10 || num === 11) {
                return { img: 'book6-1.PNG', isSinglePage: false, desc: '小芳說：「轉彎都不會看嗎？這是路口耶！」' };
            }
            if (num === 12 || num === 13) {
                return { img: 'book7-1.PNG', isSinglePage: false, desc: '她覺得委屈極了，剛剛就差那麼一點點…… ' };
            }

            // 中間命運交織與共同結尾
            if (num === 14 || num === 15) {
                return { img: '02.png', isSinglePage: false, desc: '小芳：原來靠邊走不代表絕對安全，耳機讓我失去了對危險的警覺。<br><br>阿哲：原來趕時間會把自己和別人都推向危險，我應該再慢一點。' };
            }
            if (num === 16 || num === 17) {
                return { img: '01.jpg', isSinglePage: false, title: '如果我們願意換個角度想，馬路就會更安全。', desc: '「安全意識與同理心，從換位開始。」', isSpecialEnding: true };
            }
            if (num === 18 || num === 19) {
                let pairId = num % 2 === 0 ? `${num}-${num+1}` : `${num-1}-${num}`;
                return { img: '02.png', isSinglePage: false, title: `共同結尾 (跨頁 ${pairId})`, desc: '小芳：原來靠邊走不代表絕對安全，耳機讓我失去了對危險的警覺。<br><br>阿哲：原來趕時間會把自己和別人都推向危險，我應該再慢一點。' };
            }
            
            // 阿哲的故事線
            if (num === 20 || num === 21) {
                return { img: 'book7-2.PNG', isSinglePage: false, desc: '為了趕這幾分鐘，差點賠上了一輩子……' };
            }
            if (num === 22 || num === 23) {
                return { img: 'book6-2.PNG', isSinglePage: false, desc: '他看著發抖的手，但腦袋裡全是剛才那個人影。' };
            }
            if (num === 24 || num === 25) {
                return { img: 'book5-2.PNG', isSinglePage: false, desc: '阿哲說：「走路為什麼不看路啊！害我差點摔車！」' };
            }
            if (num === 26 || num === 27) {
                return { img: 'book4-2.PNG', isSinglePage: false, desc: '突然，有人衝了出來！阿哲全身冷汗，死命抓緊煞車。' };
            }
            if (num === 28 || num === 29) {
                return { img: 'book3-2.PNG', isSinglePage: false, desc: '這個轉角是個視線死角，完全看不到另一邊的情況。他想著「這條路平時沒什麼人，應該沒關係吧？ 」' };
            }
            if (num === 30 || num === 31) {
                return { img: 'book2-2.PNG', isSinglePage: false, desc: '阿哲正在趕時間，手機上的送餐數字不斷跳動。' };
            }
            if (num === 32) {
                return { img: 'book0-2.PNG', isSinglePage: true, customText: '駕駛阿哲' };
            }
            return null;
        }

        // ==========================================
        // 【彈性 RWD 縮放】
        // ==========================================
        function resizeBook() {
            const book = document.getElementById('book');
            if (book.style.display === 'none' || book.style.display === '') return;

            const baseWidth = 1130;
            const baseHeight = 600;
            
            const windowWidth = window.innerWidth - 30;
            const windowHeight = window.innerHeight - 170; 

            let scale = Math.min(windowWidth / baseWidth, windowHeight / baseHeight);
            if (scale > 1.0) scale = 1.0; 
            if (scale < 0.35) scale = 0.35;

            book.style.transform = 'scale(' + scale + ')';
            book.style.transformOrigin = 'center center';
        }

        window.addEventListener('resize', resizeBook);

        // ==========================================
        // 渲染生成書本舞台
        // ==========================================
        function renderBook() {
            const stage = document.getElementById('book-stage');
            stage.innerHTML = '';
            
            for (let i = 0; i < totalPapers; i++) {
                const frontNum = (i * 2) + 1;
                const backNum = (i * 2) + 2;
                
                const frontData = getPageData(frontNum) || {};
                const backData = getPageData(backNum) || {};

                const paper = document.createElement('div');
                paper.className = 'paper';
                paper.id = 'paper-' + i;

                let frontClass = frontData.isSinglePage ? "full-spread-img single-mode" : "full-spread-img";
                let backClass = backData.isSinglePage ? "full-spread-img single-mode" : "full-spread-img";

                let frontCustomTextHTML = frontData.customText ? `<div class="custom-text-box">${frontData.customText}</div>` : '';
                let backCustomTextHTML = backData.customText ? `<div class="custom-text-box">${backData.customText}</div>` : '';

                paper.innerHTML = `
                    <div class="page-side front">
                        <img src="${frontData.img || ''}" class="${frontClass}" alt="Spread">
                        ${frontCustomTextHTML}
                    </div>
                    <div class="page-side back">
                        <img src="${backData.img || ''}" class="${backClass}" alt="Spread">
                        ${backCustomTextHTML}
                    </div>
                `;
                stage.appendChild(paper);
            }
        }

        // ==========================================
        // 字幕與頁碼更新管理
        // ==========================================
        function updateGlobalOverlays() {
            let leftPageNum, rightPageNum;

            if (currentMode === 'pedestrian') {
                if (currentPaperIndex === 0) {
                    leftPageNum = null;
                    rightPageNum = 1;
                } else {
                    leftPageNum = currentPaperIndex * 2;
                    rightPageNum = (currentPaperIndex * 2) + 1;
                }
            } else {
                if (currentPaperIndex === totalPapers) {
                    leftPageNum = 32; 
                    rightPageNum = null;
                } else {
                    leftPageNum = currentPaperIndex * 2;
                    rightPageNum = (currentPaperIndex * 2) + 1;
                }
            }

            const pLeft = document.getElementById('global-p-left');
            const pRight = document.getElementById('global-p-right');
            
            if (leftPageNum) { pLeft.innerText = 'P' + leftPageNum; pLeft.style.display = 'block'; }
            else { pLeft.style.display = 'none'; }

            if (rightPageNum) { pRight.innerText = 'P' + rightPageNum; pRight.style.display = 'block'; }
            else { pRight.style.display = 'none'; }

            let activeData = null;
            if (rightPageNum) activeData = getPageData(rightPageNum);
            if ((!activeData || !activeData.desc) && leftPageNum) activeData = getPageData(leftPageNum);

            const subtitleBox = document.getElementById('global-subtitle');
            if (activeData && activeData.desc) {
                if (activeData.isSpecialEnding) {
                    subtitleBox.innerHTML = `
                        <h3 style="color:#fff; margin:0 0 8px 0; font-size:30px;">${activeData.title}</h3>
                        <p style="color:#bfa15f;font-size:30px">${activeData.desc}</p>
                    `;
                } else {
                    subtitleBox.innerHTML = '<p>' + activeData.desc + '</p>';
                }
                subtitleBox.style.display = 'block';
            } else {
                subtitleBox.style.display = 'none';
            }
        }

        // ==========================================
        // 【核心優化修正點】極度精簡的 zIndex 控制邏輯，徹底解決 iPad 來回點擊卡死
        // ==========================================
        function updateZIndices() {
            for (let i = 0; i < totalPapers; i++) {
                const paper = document.getElementById('paper-' + i);
                
                if (currentMode === 'pedestrian') {
                    // 行人正翻：翻過去的 index 變小，層級隨之降低
                    if (i < currentPaperIndex) {
                        paper.style.zIndex = i + 1;
                    } else {
                        paper.style.zIndex = totalPapers - i;
                    }
                } else {
                    // 駕駛倒翻：修正 iPad 對於複雜反向層級的死鎖，改用絕對鏡像分配
                    // 當前顯示頁面與之後還沒翻開的頁面層級拉高，已經翻回去的降到最低
                    if (i >= currentPaperIndex) {
                        paper.style.zIndex = totalPapers - i + 10; // 給予基底權重緩衝，避開渲染衝突
                    } else {
                        paper.style.zIndex = i + 1;
                    }
                }
            }
            updateGlobalOverlays();
        }

        function startBook(mode) {
            currentMode = mode;
            document.getElementById('entrance').style.display = 'none';
            document.getElementById('panel').style.display = 'flex';
            document.getElementById('controls-bar').style.display = 'flex';
            document.getElementById('book').style.display = 'block';
            
            renderBook();
            resizeBook();

            if (mode === 'pedestrian') {
                document.getElementById('view-tag').innerText = "目前視角：🚶 行人小芳";
                currentPaperIndex = 0;
                resetAllPapers(false); 
            } else {
                document.getElementById('view-tag').innerText = "目前視角：🚗 駕駛阿哲";
                currentPaperIndex = totalPapers;
                resetAllPapers(true); 
            }
            updateZIndices();
        }

        function resetAllPapers(isFlipped) {
            for (let i = 0; i < totalPapers; i++) {
                const paper = document.getElementById('paper-' + i);
                if (isFlipped) {
                    paper.classList.add('flipped');
                } else {
                    paper.classList.remove('flipped');
                }
            }
        }

        function nextPage() {
            if (currentMode === 'pedestrian') {
                if (currentPaperIndex === 8) { 
                    triggerStoryEnd();
                    return;
                }
                if (currentPaperIndex < totalPapers) {
                    const paper = document.getElementById('paper-' + currentPaperIndex);
                    paper.classList.add('flipped');
                    currentPaperIndex++;
                    updateZIndices();
                }
            } else {
                if (currentPaperIndex === 8) { 
                    triggerStoryEnd();
                    return;
                }
                if (currentPaperIndex > 0) {
                    currentPaperIndex--;
                    const paper = document.getElementById('paper-' + currentPaperIndex);
                    paper.classList.remove('flipped');
                    updateZIndices();
                }
            }
        }

        function prevPage() {
            if (currentMode === 'pedestrian') {
                if (currentPaperIndex > 0) {
                    currentPaperIndex--;
                    const paper = document.getElementById('paper-' + currentPaperIndex);
                    paper.classList.remove('flipped');
                    updateZIndices();
                }
            } else {
                if (currentPaperIndex < totalPapers) {
                    const paper = document.getElementById('paper-' + currentPaperIndex);
                    paper.classList.add('flipped');
                    currentPaperIndex++;
                    updateZIndices();
                }
            }
        }

        function triggerStoryEnd() {
            stopAutoplay(); 
            const book = document.getElementById('book');
            book.style.opacity = 0; 
            book.style.transition = 'opacity 0.4s';
            setTimeout(() => { 
                resetBook(); 
                book.style.opacity = 1;
            }, 400); 
        }

        function resetBook() {
            stopAutoplay();
            document.getElementById('auto-toggle').checked = false; 
            document.getElementById('entrance').style.display = 'block';
            document.getElementById('panel').style.display = 'none';
            document.getElementById('controls-bar').style.display = 'none'; 
            document.getElementById('book').style.display = 'none';
            renderBook(); 
        }

        document.getElementById('auto-toggle').addEventListener('change', function() {
            if (this.checked) {
                document.getElementById('mode-text').innerText = "自動翻頁中";
                document.getElementById('mode-text').style.color = "#bfa15f";
                autoInterval = setInterval(() => { nextPage(); }, 4000); 
            } else {
                stopAutoplay();
            }
        });

        function stopAutoplay() {
            document.getElementById('mode-text').innerText = "自動翻頁";
            document.getElementById('mode-text').style.color = "#aaa";
            if (autoInterval) clearInterval(autoInterval);
        }

        // ==========================================
        // 鍵盤與觸控事件
        // ==========================================
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('book').style.display === 'block') {
                if (e.key === 'ArrowRight') nextPage();
                if (e.key === 'ArrowLeft') prevPage();
            }
        });

        let touchStartX = 0;
        let touchEndX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            if (document.getElementById('book').style.display !== 'block') return;
            if (touchStartX - touchEndX > 60) nextPage();
            else if (touchEndX - touchStartX > 60) prevPage();
        }, { passive: true });

        renderBook();
    </script>
</body>
</html>
