<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歡迎光臨，馬路格鬥場繪本</title>
    <style>
        :root {
            --total-width: 1130px; 
            --total-height: 600px;
            --page-width: 565px;   
        }

        body {
            background-color: #0c0c0c; 
            color: #fff;
            font-family: 'Noto Serif TC', 'Microsoft JhengHei', serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; 
            box-sizing: border-box;
            padding-top: 15px;
            padding-bottom: 15px;
            height: 100vh;
            overflow: hidden;
            perspective: 3000px;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 入口選單 */
        #entrance { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 600; width: 90%; }
        #entrance h1 { font-size: 50px; margin-bottom: 40px; letter-spacing: 2px; color: #bfa15f; }
        #entrance p { color: #aaa; margin-bottom: 35px; font-size: 24px; }
        .btn-group { display: flex; gap: 50px; justify-content: center; }
        .start-btn {
            padding: 15px 35px; font-size: 20px; cursor: pointer; border: 2px solid #bfa15f;
            background: transparent; color: #bfa15f; border-radius: 8px; transition: all 0.3s; font-weight: bold;
        }
        .start-btn:hover { background: #bfa15f; color: #1a1a1a; box-shadow: 0 0 20px rgba(191, 161, 95, 0.4); }

        /* 頂部控制面板 */
        .control-panel {
            display: none; align-items: center; gap: 20px;
            background: #1f1f1f; padding: 6px 25px; border-radius: 30px; z-index: 500;
            border: 2px solid #333;
            height: 28px;
        }
        .panel-btn { background: #333; color: #fff; border: none; padding: 4px 12px; border-radius: 15px; cursor: pointer; font-size: 13px; }
        .panel-btn:hover { background: #444; }
        .current-view-tag { font-size: 13px; color: #bfa15f; font-weight: bold; }

        /* 自動播放開關 */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; margin-left: 5px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #bfa15f; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* 書本外殼與容器 */
        .book-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
            z-index: 10;
        }

        .book-container {
            display: none;
            width: var(--total-width);
            height: var(--total-height); 
            position: relative;
            transform-style: preserve-3d;
        }

        .paper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-style: preserve-3d;
            transition: transform 1.0s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .page-side {
            position: absolute;
            height: 100%;
            width: var(--page-width); 
            top: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #111;
        }

        .full-spread-img {
            width: var(--total-width);
            height: var(--total-height);
            position: absolute;
            top: 0;
            pointer-events: none;
        }

        .single-mode {
            width: var(--page-width) !important; 
            height: 100% !important;
            object-fit: fill !important;
            left: 0 !important;
        }

        /* 左右頁精密裁切控制 */
        .front {
            left: var(--page-width);
            transform-origin: left center;
            border-radius: 0 8px 8px 0;
        }
        .front .full-spread-img:not(.single-mode) {
            left: calc(-1 * var(--page-width));
        }

        .back {
            left: 0;
            transform: rotateY(180deg);
            transform-origin: right center;
            border-radius: 8px 0 0 8px;
        }
        .back .full-spread-img {
            left: 0;
        }

        .paper.flipped {
            transform: rotateY(-180deg);
        }

        /* 封面主標題 */
        .custom-text-box {
            position: absolute;
            z-index: 30;               
            top: 45px;                 
            color: #bfa15f;            
            font-size: 34px;
            font-weight: bold;
            letter-spacing: 6px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9); 
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        /* 跨頁通欄字幕：精準置中，不重複 */
        .text-overlay {
            position: absolute;
            bottom: 0;
            width: var(--total-width);         
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 75%, rgba(0,0,0,0) 100%);
            padding: 60px 40px 35px 40px;
            z-index: 25;
            color: #fff;
            box-sizing: border-box;
            pointer-events: none;
            text-align: center;
        }
        .text-overlay p { font-size: 19px; line-height: 1.6; margin: 0; text-align: center; opacity: 0.95; letter-spacing: 1px; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }

        /* 綁定在 front 內的跨頁通欄字幕定位 */
        .front .text-overlay { left: calc(-1 * var(--page-width)); }
        /* 綁定在 back 內的跨頁通欄字幕定位 */
        .back .text-overlay { left: 0; }

        /* 頁碼：永不干擾視覺 */
        .floating-num {
            position: absolute;
            bottom: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            color: #ccc;
            z-index: 35;
            pointer-events: none;
        }
        .front .floating-num { right: 20px; }
        .back .floating-num { left: 20px; }

        /* 底部控制按鈕列：徹底跟畫布拉開距離 */
        .page-controls { display: none; gap: 50px; z-index: 500; height: 40px; margin-bottom: 5px; }
        .nav-btn {
            background-color: #1a1a1a; color: #bfa15f; border: 2px solid #bfa15f;
            padding: 8px 32px; font-size: 15px; font-weight: bold; border-radius: 25px; cursor: pointer;
            transition: all 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .nav-btn:hover { background-color: #bfa15f; color: #1a1a1a; box-shadow: 0 0 15px rgba(191, 161, 95, 0.5); }
    </style>
</head>
<body>

    <div class="control-panel" id="panel">
        <button class="panel-btn" onclick="resetBook()">返回選單</button>
        <span class="current-view-tag" id="view-tag">目前視角：行人小芳</span>
        <span style="font-size: 13px; margin-left: 15px; color: #aaa;" id="mode-text">自動翻頁</span>
        <label class="switch">
            <input type="checkbox" id="auto-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="book-wrapper">
        <div id="entrance">
            <h1>《 歡迎光臨，馬路格鬥場 》</h1>
            <p>點選你想觀看的角色，進入不同的視角故事：</p>
            <div class="btn-group">
                <button class="start-btn" onclick="startBook('pedestrian')">🚶 行人小芳 視角</button>
                <button class="start-btn" onclick="startBook('driver')">🚗 駕駛阿哲 視角</button>
            </div>
        </div>
        <div class="book-container" id="book"></div>
    </div>

    <div class="page-controls" id="controls-bar">
        <button class="nav-btn" onclick="prevPage()">◀ 上一頁</button>
        <button class="nav-btn" onclick="nextPage()">下一頁 ▶</button>
    </div>

    <script>
        const totalPages = 32;
        const totalPapers = totalPages / 2; 
        let currentMode = 'pedestrian'; 
        let currentPaperIndex = 0;      
        let autoInterval = null; 

        // ==========================================
        // 【資料庫邏輯】 完美保留你原始的所有圖片檔名與大小寫
        // ==========================================
        function getPageData(num) {
            if (num === 1) {
                return { img: 'book0-1.PNG', isSinglePage: true, customText: '行人小芳' };
            }
            if (num === 2 || num === 3) {
                return { img: 'book2-1.PNG', isSinglePage: false, desc: '小芳今天心情很好，音樂裡的節奏讓步履變得很輕快。耳機裡的旋律蓋過了城市的喧囂。' };
            }
            if (num === 4 || num === 5) {
                return { img: 'book3-1.PNG', isSinglePage: false, desc: '她覺得自己走得很邊邊了，躲在建築物的陰影下，這裡應該很安全。' };
            }
            if (num === 6 || num === 7) {
                return { img: 'book4-1.PNG', isSinglePage: false, desc: '這個路口沒有號誌。小芳沒有停下，她正忙著回覆訊息。' };
            }
            if (num === 8 || num === 9) {
                return { img: 'book5-1.PNG', isSinglePage: false, desc: '下一秒，機車突然出現！小芳受到極大的驚嚇。' };
            }
            if (num === 10 || num === 11) {
                return { img: 'book6-1.PNG', isSinglePage: false, desc: '小芳說：「轉彎都不會看嗎？這是路口耶！」' };
            }
            if (num === 12 || num === 13) {
                return { img: 'book7-1.PNG', isSinglePage: false, desc: '她覺得委屈極了，剛剛就差那麼一點點…… ' };
            }

            // 中間命運交織與共同結尾
            if (num === 14 || num === 15) {
                return { img: '02.png', isSinglePage: false, desc: '小芳：原來靠邊走不代表絕對安全，耳機讓我失去了對危險的警覺。<br><br>阿哲：原來趕時間會把自己和別人都推向危險，我應該再慢一點。' };
            }
            if (num === 16 || num === 17) {
                return { img: '01.jpg', isSinglePage: false, title: '如果我們願意換個角度想，馬路就會更安全。', desc: '「安全意識與同理心，從換位開始。」', isSpecialEnding: true };
            }
            if (num === 18 || num === 19) {
                let pairId = num % 2 === 0 ? `${num}-${num+1}` : `${num-1}-${num}`;
                return { img: '02.png', isSinglePage: false, title: `共同結尾 (跨頁 ${pairId})`, desc: '小芳：原來靠邊走不代表絕對安全，耳機讓我失去了對危險的警覺。<br><br>阿哲：原來趕時間會把自己和別人都推向危險，我應該再慢一點。' };
            }
            
            // 阿哲的故事線
            if (num === 20 || num === 21) {
                return { img: 'book7-2.PNG', isSinglePage: false, desc: '為了趕這幾分鐘，差點賠上了一輩子……' };
            }
            if (num === 22 || num === 23) {
                return { img: 'book6-2.PNG', isSinglePage: false, desc: '他看著發抖的手，但腦袋裡全是剛才那個人影。' };
            }
            if (num === 24 || num === 25) {
                return { img: 'book5-2.PNG', isSinglePage: false, desc: '阿哲說：「走路為什麼不看路啊！害我差點摔車！」' };
            }
            if (num === 26 || num === 27) {
                return { img: 'book4-2.PNG', isSinglePage: false, desc: '突然，有人衝了出來！阿哲全身冷汗，死命抓緊煞車。' };
            }
            if (num === 28 || num === 29) {
                return { img: 'book3-2.PNG', isSinglePage: false, desc: '這個轉角是個視線死角，完全看不到另一邊的情況。他想著「這條路平時沒什麼人，應該沒關係吧？ 」' };
            }
            if (num === 30 || num === 31) {
                return { img: 'book2-2.PNG', isSinglePage: false, desc: '阿哲正在趕時間，手機上的送餐數字不斷跳動。' };
            }
            if (num === 32) {
                return { img: 'book0-2.PNG', isSinglePage: true, customText: '駕駛阿哲' };
            }
            return null;
        }

        // ==========================================
        // 【精確比例縮放】確保書籍與上下控制列絕對不撞車
        // ==========================================
        function resizeBook() {
            const book = document.getElementById('book');
            if (book.style.display === 'none' || book.style.display === '') return;

            const baseWidth = 1130;
            const baseHeight = 600;
            
            const windowWidth = window.innerWidth - 40;
            const windowHeight = window.innerHeight - 150; // 加大安全間距

            let scale = Math.min(windowWidth / baseWidth, windowHeight / baseHeight);
            if (scale > 1.0) scale = 1.0; 
            if (scale < 0.35) scale = 0.35;

            book.style.transform = `scale(${scale})`;
            book.style.transformOrigin = 'center center';
        }

        window.addEventListener('resize', resizeBook);

        // ==========================================
        // 動態生成書本結構（解決小芳/阿哲視角字幕相反與重複的終極核心）
        // ==========================================
        function renderBook() {
            const container = document.getElementById('book');
            container.innerHTML = '';
            
            for (let i = 0; i < totalPapers; i++) {
                const frontNum = (i * 2) + 1;
                const backNum = (i * 2) + 2;
                
                const frontData = getPageData(frontNum) || {};
                const backData = getPageData(backNum) || {};

                const paper = document.createElement('div');
                paper.className = 'paper';
                paper.id = `paper-${i}`;

                let frontClass = frontData.isSinglePage ? "full-spread-img single-mode" : "full-spread-img";
                let backClass = backData.isSinglePage ? "full-spread-img single-mode" : "full-spread-img";

                let frontCustomTextHTML = frontData.customText ? `<div class="custom-text-box">${frontData.customText}</div>` : '';
                let backCustomTextHTML = backData.customText ? `<div class="custom-text-box">${backData.customText}</div>` : '';

                // 【核心修正點】動態依據視角渲染字幕：
                // 如果是行人小芳（正著翻），字幕綁在右頁 (frontData)；如果是駕駛阿哲（倒著翻回來），字幕改綁在左頁 (backData)
                let frontTextHTML = '';
                let backTextHTML = '';

                if (currentMode === 'pedestrian') {
                    if (frontData.desc) {
                        if (frontData.isSpecialEnding) {
                            frontTextHTML = `
                                <div class="text-overlay">
                                    <h3 style="color:#fff; margin:0 0 10px 0; font-size:20px;">${frontData.title}</h3>
                                    <p style="color:#bfa15f;">${frontData.desc}</p>
                                </div>`;
                        } else {
                            frontTextHTML = `<div class="text-overlay"><p>${frontData.desc}</p></div>`;
                        }
                    }
                } else {
                    // 阿哲視角：將對應跨頁的字幕渲染到左頁(back)
                    if (backData.desc) {
                        backTextHTML = `<div class="text-overlay"><p>${backData.desc}</p></div>`;
                    }
                }

                paper.innerHTML = `
                    <div class="page-side front">
                        <img src="${frontData.img || ''}" class="${frontClass}" alt="Spread">
                        ${frontCustomTextHTML}
                        ${frontTextHTML}
                        <div class="floating-num">P${frontNum}</div>
                    </div>
                    <div class="page-side back">
                        <img src="${backData.img || ''}" class="${backClass}" alt="Spread">
                        ${backCustomTextHTML}
                        ${backTextHTML}
                        <div class="floating-num">P${backNum}</div>
                    </div>
                `;
                container.appendChild(paper);
            }
        }

        // ==========================================
        // 翻頁層級管理
        // ==========================================
        function updateZIndices() {
            for (let i = 0; i < totalPapers; i++) {
                const paper = document.getElementById(`paper-${i}`);
                if (currentMode === 'pedestrian') {
                    if (i < currentPaperIndex) {
                        paper.style.zIndex = i + 1;
                    } else {
                        paper.style.zIndex = totalPapers - i;
                    }
                } else {
                    if (i >= currentPaperIndex) {
                        paper.style.zIndex = totalPapers - i;
                    } else {
                        paper.style.zIndex = i + 1;
                    }
                }
            }
        }

        function startBook(mode) {
            currentMode = mode;
            document.getElementById('entrance').style.display = 'none';
            document.getElementById('panel').style.display = 'flex';
            document.getElementById('controls-bar').style.display = 'flex';
            document.getElementById('book').style.display = 'block';
            
            // 根據不同視角先重新建構字幕方向，再做縮放調整
            renderBook();
            resizeBook();

            if (mode === 'pedestrian') {
                document.getElementById('view-tag').innerText = "目前視角：🚶 行人小芳";
                currentPaperIndex = 0;
                resetAllPapers(false); 
            } else {
                document.getElementById('view-tag').innerText = "目前視角：🚗 駕駛阿哲";
                currentPaperIndex = totalPapers;
                resetAllPapers(true); 
            }
            updateZIndices();
        }

        function resetAllPapers(isFlipped) {
            for (let i = 0; i < totalPapers; i++) {
                const paper = document.getElementById(`paper-${i}`);
                if (isFlipped) {
                    paper.classList.add('flipped');
                } else {
                    paper.classList.remove('flipped');
                }
            }
        }

        function nextPage() {
            if (currentMode === 'pedestrian') {
                if (currentPaperIndex === 8) { 
                    triggerStoryEnd();
                    return;
                }
                if (currentPaperIndex < totalPapers) {
                    const paper = document.getElementById(`paper-${currentPaperIndex}`);
                    paper.classList.add('flipped');
                    currentPaperIndex++;
                    updateZIndices();
                }
            } else {
                if (currentPaperIndex === 8) { 
                    triggerStoryEnd();
                    return;
                }
                if (currentPaperIndex > 0) {
                    currentPaperIndex--;
                    const paper = document.getElementById(`paper-${currentPaperIndex}`);
                    paper.classList.remove('flipped');
                    updateZIndices();
                }
            }
        }

        function prevPage() {
            if (currentMode === 'pedestrian') {
                if (currentPaperIndex > 0) {
                    currentPaperIndex--;
                    const paper = document.getElementById(`paper-${currentPaperIndex}`);
                    paper.classList.remove('flipped');
                    updateZIndices();
                }
            } else {
                if (currentPaperIndex < totalPapers) {
                    const paper = document.getElementById(`paper-${currentPaperIndex}`);
                    paper.classList.add('flipped');
                    currentPaperIndex++;
                    updateZIndices();
                }
            }
        }

        function triggerStoryEnd() {
            stopAutoplay(); 
            const book = document.getElementById('book');
            book.style.opacity = 0; 
            book.style.transition = 'opacity 0.4s';
            setTimeout(() => { 
                resetBook(); 
                book.style.opacity = 1;
            }, 400); 
        }

        function resetBook() {
            stopAutoplay();
            document.getElementById('auto-toggle').checked = false; 
            document.getElementById('entrance').style.display = 'block';
            document.getElementById('panel').style.display = 'none';
            document.getElementById('controls-bar').style.display = 'none'; 
            document.getElementById('book').style.display = 'none';
            renderBook(); 
        }

        document.getElementById('auto-toggle').addEventListener('change', function() {
            if (this.checked) {
                document.getElementById('mode-text').innerText = "自動翻頁中";
                document.getElementById('mode-text').style.color = "#bfa15f";
                autoInterval = setInterval(() => { nextPage(); }, 4000); 
            } else {
                stopAutoplay();
            }
        });

        function stopAutoplay() {
            document.getElementById('mode-text').innerText = "自動翻頁";
            document.getElementById('mode-text').style.color = "#aaa";
            if (autoInterval) clearInterval(autoInterval);
        }

        // ==========================================
        // 鍵盤與觸控事件
        // ==========================================
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('book').style.display === 'block') {
                if (e.key === 'ArrowRight') nextPage();
                if (e.key === 'ArrowLeft') prevPage();
            }
        });

        let touchStartX = 0;
        let touchEndX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            if (document.getElementById('book').style.display !== 'block') return;
            if (touchStartX - touchEndX > 60) nextPage();
            else if (touchEndX - touchStartX > 60) prevPage();
        }, { passive: true });

        renderBook();
    </script>
</body>
</html>
